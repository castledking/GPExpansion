# Default configuration for GPExpansion

# Debug settings
debug:
  # Enable debug logging for GPBridge to troubleshoot claim/subclaim detection
  enabled: false

# Message settings
messages:
  # Show detailed permission info when player lacks permission (e.g., "Missing: griefprevention.sign.rent.exp")
  show-permission-details: true

# Claim flight settings
# false = players need claim flight time from /claimfly admin commands
# true = players with griefprevention.claimfly.use can fly in owned/trusted claims without time
passive-claim-flight: false

# Mailbox protocol (first-time default is set from GP: GP3D -> real, regular GP -> virtual; change below as desired):
# real = create subdivision + container trust public (non-owner opens real chest with dynamic updates)
# virtual = no subdivision, virtual view, non-updating (useful for non-GP3D users who want stackable mailboxes)
mailbox-protocol: virtual

accruals:
  # Amount of accrued claim blocks per hour and max cap, based on permissions.
  # You can add/remove as many names here that you want.
  # Permission nodes are in the format griefprevention.accruals.<groupname>.<type>
  # Examples:
  #   - default: 10 blocks/hour, max 1000 blocks |
  #       * griefprevention.accruals.default.blocks
  #       * griefprevention.accruals.default.max
  #       * griefprevention.accruals.default.claims
  #   - vip: 20 blocks/hour, max 2000 blocks |
  #       * griefprevention.accruals.vip.blocks
  #       * griefprevention.accruals.vip.max
  #       * griefprevention.accruals.vip.claims
  #   - elite: 50 blocks/hour, max 5000 blocks |
  #       * griefprevention.accruals.elite.blocks
  #       * griefprevention.accruals.elite.max
  #       * griefprevention.accruals.elite.claims
  # Or you can give the griefprevention.accruals.<groupname> for all types.
  groups:
  - name: default
    blocks-per-hour: 100
    max-blocks: 80000
    max-claims: 0 # disabled
  - name: vip
    blocks-per-hour: 20
    max-blocks: 250000
    max-claims: 10
  - name: elite
    blocks-per-hour: 50
    max-blocks: 1000000
    max-claims: 20
    permission: elite-reward # optional additional permission for this type (griefprevention.accruals.elite-reward)

# Default limits for sign creation (can be overridden by permissions)
defaults:
  # Default maximum number of global claims a player can have
  max-global-claims: 1
  # Default maximum number of sell signs a player can create
  max-sell-signs: 5
  # Default maximum number of rent signs a player can create
  max-rent-signs: 5
  # Default maximum number of mailbox signs a player can create
  max-mailbox-signs: 5
  # Max self mailboxes per claim (for claims owned or rented by the player)
  max-self-mailboxes-per-claim: 1

# Player command permissions (dynamically assigned to gpx.player permission)
# A list of permissions starting from griefprevention.<permission> that the gpx.player permission should have
# Permissions are dynamically updated on /gpx reload
player-commands:
  - claims
  - claim.name
  - claim.name.anywhere
  - claim.description
  - claim.description.anywhere
  - claim.icon
  - claim.ban
  - claim.ban.anywhere
  - claim.unban
  - claim.unban.anywhere
  - claim.banlist
  - claim.banlist.anywhere
  - sign.create.rent
  - sign.use.rent
  - sign.rent.money
  - sign.create.sell
  - sign.use.sell
  - sign.sell.money
  - sign.create.buy
  - sign.use.buy
  - sign.create.mailbox
  - sign.use.mailbox
  - sign.mailbox.money
  - sign.create.self-mailbox
  - claiminfo
  # - claim.teleport
  - claim.setspawn
  - claim.gui.setclaimflag.own
  - claim.gui.globallist
  - claimfly.use
  - claim.toggleglobal
  - claim.toggleglobal.anywhere
  - claim.toggleglobal.1
  - claim.color.black
  - claim.color.dark_blue
  - claim.color.dark_green
  - claim.color.dark_aqua
  - claim.color.dark_red
  - claim.color.dark_purple
  - claim.color.gold
  - claim.color.gray
  - claim.color.dark_gray
  - claim.color.blue
  - claim.color.green
  - claim.color.aqua
  - claim.color.red
  - claim.color.light_purple
  - claim.color.yellow
  - claim.color.white
  - claim.format.bold
  - claim.format.italic
  - claim.format.reset

# Permission tracking settings
permission-tracking:
  # Enable tracking of player permissions for sign/accrual limits
  enabled: true
  # How often to check for permission changes (in minutes)
  check-interval: 5

# GUI settings
gui:
  # Enable GUI mode for /claim command
  # When enabled, /claim opens an interactive menu instead of showing subcommand list
  enabled: true

# Claim teleport settings
teleport:
  # Delay before a player is teleported to a claim (0 to disable)
  delay-seconds: 3
  # Cooldown after teleporting to a claim before another claim teleport can be used (0 to disable)
  cooldown-seconds: 10

# Tax settings (requires Vault economy)
tax:
  # Percentage of rent/purchase payments taken as tax (0 to disable)
  # The tax is deducted from the landlord's payment and deposited to the tax account
  percent: 5
  # The NPC account name to deposit tax into
  # This account is automatically created if it doesn't exist
  account-name: "Tax"

# Eviction settings
eviction:
  # Time before a renter can be evicted after notice is given.
  # Supports: 14d, 1d, 24h, 1h, 30m, 10s, 1w (days/hours/minutes/seconds/weeks).
  # Plain number (e.g. 14) is treated as days.
  notice-period: 14d

# Version tracking and update checking
version:
  # Current configuration version (DO NOT MODIFY)
  # Used to handle configuration migrations between versions
  config-version: "1.1.1"
  
  # Update checking settings
  update-checker:
    # Enable checking for updates on SpigotMC
    enabled: true
    # How often to check for updates (in hours)
    check-interval: 24
    # Notify admins in-game when updates are available
    notify-admins: true
    # Log update notifications to console
    log-to-console: true

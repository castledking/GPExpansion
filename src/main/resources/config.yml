# GPExpansion configuration
#
# This file is being reorganized around the actual feature areas GPExpansion owns.
# Sections marked "planned" are intentionally present as design targets for the
# next implementation passes. They are safe to leave in the file, but the current
# plugin may not read every planned option yet.

# =============================================================================
# Core
# =============================================================================

debug:
  # Enable verbose bridge/debug logging for claim detection and GP compatibility.
  enabled: false

messages:
  # Show detailed permission info when a player lacks permission.
  # Example: "Missing: griefprevention.sign.rent.money"
  show-permission-details: true


# =============================================================================
# Claim Blocks and Accruals
# =============================================================================

accruals:
  enabled: true
  pause-while-afk: false
  pause-while-vanished: true
  require-survival-mode: false
  notify-on-cap: true
  # Claim block accrual profiles.
  #
  # Permission nodes:
  # - griefprevention.accruals.<group>
  # - griefprevention.accruals.<group>.blocks
  # - griefprevention.accruals.<group>.max
  # - griefprevention.accruals.<group>.claims
  #
  # The optional permission field below adds one extra permission requirement.
  groups:
    - name: default
      blocks-per-hour: 100
      max-blocks: 80000
      max-claims: 0 # 0 = no max-claims override

    - name: vip
      blocks-per-hour: 200
      max-blocks: 250000
      max-claims: 10

    - name: elite
      blocks-per-hour: 500
      max-blocks: 1000000
      max-claims: 20
      permission: elite-reward # griefprevention.accruals.elite-reward
  world-blacklist: []
  world-multipliers:
    world: 1.0
    world_nether: 0.5
    world_the_end: 0.5


# =============================================================================
# Commands and Dynamic Player Permissions
# =============================================================================

# Player command permissions dynamically assigned to the gpx.player permission.
# Entries are relative to griefprevention.<permission>.
player-commands:
  - claims
  - claim.name
  - claim.name.anywhere
  - claim.description
  - claim.description.anywhere
  - claim.icon
  - claim.ban
  - claim.ban.anywhere
  - claim.unban
  - claim.unban.anywhere
  - claim.banlist
  - claim.banlist.anywhere
  - claim.cancelrent
  - claim.cancelrent.anywhere
  - sign.create.rent
  - sign.use.rent
  - sign.rent.money
  - sign.create.sell
  - sign.use.sell
  - sign.sell.money
  - sign.create.buy
  - sign.use.buy
  - sign.create.mailbox
  - sign.use.mailbox
  - sign.mailbox.money
  - sign.create.self-mailbox
  - claiminfo
  # - claim.teleport
  - claim.setspawn
  - claim.gui.setclaimflag.own
  - claim.gui.globallist
  - claimfly.use
  - claim.toggleglobal
  - claim.toggleglobal.anywhere
  - claim.toggleglobal.1
  - claim.color.black
  - claim.color.dark_blue
  - claim.color.dark_green
  - claim.color.dark_aqua
  - claim.color.dark_red
  - claim.color.dark_purple
  - claim.color.gold
  - claim.color.gray
  - claim.color.dark_gray
  - claim.color.blue
  - claim.color.green
  - claim.color.aqua
  - claim.color.red
  - claim.color.light_purple
  - claim.color.yellow
  - claim.color.white
  - claim.format.bold
  - claim.format.italic
  - claim.format.reset

permission-tracking:
  # Track player permission changes for sign limits and accrual profile changes.
  enabled: true
  # How often to check for permission changes, in minutes.
  check-interval: 5


# =============================================================================
# Signs
# =============================================================================

signs:
  rent:
    enabled: true
    allow-renewals: true
    allow-item-payments: true
    allow-money-payments: true
    allow-claimblock-payments: true
    allow-experience-payments: true
    require-container-for-item-payments: true
    prevent-owner-breaking-active-rental: true
    auto-remove-expired-signs: false
    clear-on-abandon: true
    max-rent-duration: 30d

    sign-formats:
      inputs:
        - "[rent]"
        - "[rent claim]"
      outputs:
        header: "&a&l[Rent Claim]"
        display-claim-id: true
    hanging-sign-formats:
      inputs:
        - "[rent]"
      outputs:
        header: "&a&l[Rent]"
        display-claim-id: true

    limits:
      max-signs: 5
      count-expired-rentals: true
      count-inactive-signs: true
      bypass-permission: griefprevention.sign.rent.limit.bypass

    renewal:
      max-click-renewals: 5
      deny-renewal-when-eviction-pending: true
      too-close-to-max-window: 1h

    trust:
      grant-container-trust: false
      grant-access-trust: false
      clear-renter-trust-on-expire: true
      clear-renter-trust-on-evict: true

    eviction:
      # Time before a renter can be evicted after notice is given.
      # Supports: 14d, 1d, 24h, 1h, 30m, 10s, 1w.
      # Plain number is treated as days.
      notice-period: 14d
      allow-owner-cancel: true
      allow-admin-cancel: true
      require-standing-in-claim: true
      block-sign-break-until-effective: true
      notify-renter-on-start: true
      notify-owner-on-complete: true
      restore-snapshot-on-evict: false
      remove-renter-trust-on-start: false
      remove-renter-trust-on-complete: true

    snapshots:
      max-per-claim: 5
      auto-create:
        on-rent-sign-create: false
        on-rental-start: false
        before-eviction-complete: false
      auto-restore:
        on-rental-expire: false
        on-eviction-complete: false

  sell:
    enabled: true
    allow-item-payments: true
    allow-money-payments: true
    allow-claimblock-payments: true
    allow-experience-payments: true
    clear-trust-on-sale: true
    transfer-global-listing: false
    transfer-spawn-point: true
    require-confirmation: true
    remove-sign-after-sale: true

    sign-formats:
      inputs:
        - "[sell]"
        - "[sell claim]"
        - "[buy]"
        - "[buy claim]"
      outputs:
        header: "&a&l[Buy Claim]"
        display-claim-id: true
    hanging-sign-formats:
      inputs:
        - "[sell]"
        - "[buy]"
      outputs:
        header: "&a&l[Buy]"
        display-claim-id: true

    limits:
      max-signs: 5
      count-inactive-signs: true
      bypass-permission: griefprevention.sign.sell.limit.bypass

  mailbox:
    enabled: true
    allow-self-mailboxes: true
    require-container-attached: true
    allow-stacked-mailboxes: true
    allow-hoppers: false
    allow-owner-quick-collect: true
    # first-time default is set from GP: GP3D -> real, regular GP -> virtual.
    # real = subdivision + public container trust.
    # virtual = no subdivision, virtual inventory snapshot.
    protocol: virtual
    virtual:
      update-mode: snapshot # snapshot, live-preview, live-commit
      snapshot-update-interval: 0
      allow-multiple-depositors: false
      return-items-when-full: true
      save-on-close-only: true
    sign-formats:
      inputs:
        - "[mailbox]"
        - "[mbox]"
      outputs:
        header: "&9&l[Mailbox]"
        display-claim-id: false
    hanging-sign-formats:
      inputs:
        - "[mailbox]"
        - "[mbox]"
      outputs:
        header: "&9&l[Mailbox]"
        display-claim-id: false

    limits:
      max-signs: 5
      max-self-mailboxes-per-claim: 1
      count-inactive-signs: true
      bypass-permission: griefprevention.sign.mailbox.limit.bypass

    storage-warnings:
      enabled: true
      thresholds:
        - 75
        - 90
        - 100

    sounds:
      open: block.chest.open
      close: block.chest.close
      deposit: entity.item.pickup
      full: block.note_block.bass

  global:
    enabled: true
    allow-sign-toggle: true
    require-claim-owner: true
    set-spawn-on-create: true
    default-listed: true
    sign-formats:
      inputs:
        - "[global]"
      outputs:
        header: "&b&l[Global]"
        display-claim-id: true
    hanging-sign-formats:
      inputs:
        - "[global]"
      outputs:
        header: "&b&l[Global]"
        display-claim-id: true

    limits:
      max-claims-per-player: 1
      count-unlisted-claims: true
      bypass-permission: griefprevention.claim.global.limit.bypass


# =============================================================================
# Claim Listing and Global Claims
# =============================================================================

claim-list:
  show-owner-list-to-console: true
  show-trusted-claims: true
  show-subclaims: true
  show-world: true
  show-coordinates: true
  show-area: true
  show-name: true
  show-claim-block-summary: true
  page-size: 10

global-claims:
  enabled: true
  allow-teleport: true
  require-approval: false
  default-icon: GRASS_BLOCK
  default-sort: newest # newest, name, owner, world
  max-name-length: 48
  max-description-length: 256
  teleport-requires-safe-spawn: true
  public-signs-set-spawn: true


# =============================================================================
# Claim Teleport
# =============================================================================

teleport:
  # Delay before a player is teleported to a claim. 0 = instant.
  delay-seconds: 3
  # Cooldown after teleporting to a claim. 0 = no cooldown.
  cooldown-seconds: 10
  # Cancel delayed teleport if the player moves.
  cancel-on-move: true

  safe-location:
    enabled: true
    search-radius: 8
    allow-nearby-fallback: true
    confirm-unsafe-teleport: true
    # Players in CREATIVE or SPECTATOR mode bypass unsafe location checks
    staff-ignore-unsafe-location: true
  effects:
    start-sound: entity.enderman.teleport
    complete-sound: entity.player.levelup
    particles: portal
  bypass:
    cooldown-permission: griefprevention.claim.teleport.bypass.cooldown
    delay-permission: griefprevention.claim.teleport.bypass.delay


# =============================================================================
# Claim Flight
# =============================================================================

claim-flight:
  # Current compatibility toggle. When true, players with claimfly.use can fly
  # in owned/trusted claims without needing time in their flight bank.
  passive-mode: false

  enabled: true
  require-toggle-command: true
  consume-time-while-hovering: true
  consume-time-in-creative: false
  default-time: 0
  max-time: 0 # 0 = unlimited bank
  disable-on-pvp: true
  disable-on-damage: false
  disable-on-leaving-claim: true
  landing-grace-seconds: 5
  allow-in-admin-claims: true
  allow-in-public-global-claims: false
  trust-levels:
    owner: true
    manager: true
    builder: true
    container: false
    access: false


# =============================================================================
# Claim Names, Descriptions, Icons, and Moderation
# =============================================================================

claim-customization:
  names:
    max-length: 48
    allow-colors: true
    allow-formats: true
    allow-minimessage: true
    strip-obfuscated: true
  descriptions:
    max-length: 256
    allow-colors: true
    allow-formats: true
    allow-minimessage: true
    allow-links: false
  icons:
    allow-custom-items: true
    allow-player-heads: true
    deny-materials:
      - BARRIER
      - COMMAND_BLOCK
  bans:
    prevent-entry: true
    prevent-teleport: true
    eject-on-reload: true
    public-ban-permission: griefprevention.claim.ban.public
    admin-bypass-permission: griefprevention.admin


# =============================================================================
# GUI
# =============================================================================

gui:
  # Enable GUI mode for /claim.
  enabled: true


# =============================================================================
# Economy and Tax
# =============================================================================

tax:
  # Percentage of rent/purchase payments taken as tax. 0 disables tax.
  percent: 5
  # NPC account name to deposit tax into.
  account-name: "Tax"

  enabled: true
  exempt-permission: griefprevention.tax.exempt
  apply-to:
    rent: true
    sell: true
    mailbox: false
    claim-block-purchases: false
  deposit-mode: npc-account # npc-account, server-bank, void
  round-mode: nearest # nearest, floor, ceil
  minimum-tax: 0
  notify-payer: true
  notify-payee: true
  ledger:
    enabled: false
    retain-days: 90


# =============================================================================
# Eviction
# =============================================================================

eviction:
  # Time before a renter can be evicted after notice is given.
  # Supports: 14d, 1d, 24h, 1h, 30m, 10s, 1w.
  # Plain number is treated as days.
  notice-period: 14d

  allow-owner-cancel: true
  allow-admin-cancel: true
  require-standing-in-claim: true
  block-sign-break-until-effective: true
  notify-renter-on-start: true
  notify-owner-on-complete: true
  restore-snapshot-on-evict: false
  remove-renter-trust-on-start: false
  remove-renter-trust-on-complete: true


# =============================================================================
# Snapshots and Rental Restoration
# =============================================================================

snapshots:
  enabled: true
  max-per-claim: 5
  auto-create:
    on-rent-sign-create: false
    on-rental-start: false
    before-eviction-complete: false
  auto-restore:
    on-rental-expire: false
    on-eviction-complete: false
    on-sale: false
  cleanup:
    enabled: true
    retain-days: 30
    remove-when-claim-deleted: true
  compression: true
  async-restore: true
  max-blocks-per-tick: 5000


# =============================================================================
# Integrations
# =============================================================================

integrations:
  griefprevention:
    detect-gp3d: true
    prefer-gp3d-3d-claims: true
    use-native-visualizations: true
  vault:
    fail-closed-when-missing: true
    ignore-vault-missing: true
  luckperms:
    sync-dynamic-player-permission: true
  placeholderapi:
    enabled: true
  discord:
    # Planned: report high-value claim events to DiscordSRV or a webhook.
    enabled: false
    webhook-url: ""
    events:
      rental-start: true
      rental-expire: true
      eviction-start: true
      eviction-complete: true
      claim-sale: true

# =============================================================================
# Version Tracking and Update Checking
# =============================================================================

version:
  # Current configuration version. Used for migrations.
  config-version: "1.1.2"

  update-checker:
    enabled: true
    check-interval: 24
    notify-admins: true
    log-to-console: true

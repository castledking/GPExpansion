name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: "Test on JDK ${{ matrix.java }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]
    steps:
      - name: "Checkout GPExpansion"
        uses: actions/checkout@v4
      - name: "Set up JDK ${{ matrix.java }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven
      - name: "Clone and Build GriefPrevention3D"
        run: |
          git clone https://github.com/castledking/GriefPrevention3D.git /tmp/GriefPrevention3D
          cd /tmp/GriefPrevention3D
          mvn --batch-mode install -DskipTests
      - name: "Test"
        run: mvn --batch-mode verify

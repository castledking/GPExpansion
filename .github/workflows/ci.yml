name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: "Test on JDK ${{ matrix.java }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21 ]
    steps:
      - name: "Checkout GPExpansion"
        uses: actions/checkout@v4
      - name: "Set up JDK ${{ matrix.java }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven
      - name: "Clone and Build GriefPrevention3D"
        run: |
          git clone https://github.com/castledking/GriefPrevention3D.git /tmp/GriefPrevention3D
          cd /tmp/GriefPrevention3D
          git checkout ${{ vars.GP3D_VERSION || '17.5.2' }}
          chmod +x gradlew
          ./gradlew jar
          mvn install:install-file \
            -Dfile=build/libs/GriefPrevention3D.jar \
            -DgroupId=com.griefprevention \
            -DartifactId=GriefPrevention3D \
            -Dversion=${{ vars.GP3D_VERSION || '17.5.2' }} \
            -Dpackaging=jar \
            -DgeneratePom=true
      - name: "Test"
        run: mvn --batch-mode verify
